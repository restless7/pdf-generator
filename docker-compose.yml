version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis-worker
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --stop-writes-on-bgsave-error no
    volumes:
      - /home/jauria/docker-data/redis:/data
    networks:
      - planmaestro-net

  garage:
    image: dxflrs/garage:v1.3.1
    container_name: garage-s3
    restart: unless-stopped
    volumes:
      - /home/jauria/docker-data/garage:/var/lib/garage
      - ./garage.toml:/etc/garage.toml:ro
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    networks:
      - planmaestro-net

  pdf-worker:
    # Use the locally built image
    image: pdf-generator:latest
    container_name: pdf-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=https://s3.apexaisolutions.dev
      - S3_ACCESS_KEY_ID=GK3d8c41bc1d540c4f91a12ff3
      - S3_SECRET_ACCESS_KEY=0e87bcda6e5da027008e5ceb3f992f066bc895b2635b27cd70fcdf6be1548b3c
      - S3_BUCKET=planmaestro-pdfs
      - S3_REGION=us-east-1
      - S3_FORCE_PATH_STYLE=true
      - PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH=/usr/bin/chromium
    depends_on:
      - redis
      - garage
    ports:
      - "9091:9091"
    networks:
      - planmaestro-net

networks:
  planmaestro-net:
    external: true
    name: planmaestro-db_planmaestro-net
